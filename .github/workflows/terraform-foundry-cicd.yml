name: Terraform Foundry AVM CI/CD

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-foundry-cicd.yml"
  push:
    branches: ["main"]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-foundry-cicd.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Set true to run terraform apply"
        required: true
        default: false
        type: boolean
      tfvars_file:
        description: "Optional tfvars file under infra/terraform (e.g. terraform.tfvars)"
        required: false
        default: "terraform.tfvars"
        type: string

permissions:
  contents: read
  id-token: write

env:
  TF_WORKING_DIR: infra/terraform
  TF_IN_AUTOMATION: true

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init (no backend for plan)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false -input=false

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TFVARS_FILE: ${{ github.event.inputs.tfvars_file || 'terraform.tfvars' }}
        run: |
          if [ -f "$TFVARS_FILE" ]; then
            terraform plan -no-color -input=false -var-file="$TFVARS_FILE" -out=tfplan
          else
            terraform plan -no-color -input=false -out=tfplan
          fi
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan.txt

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [validate, plan]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TFSTATE_CONTAINER }}
          TFSTATE_KEY: ${{ secrets.TFSTATE_KEY }}
        run: |
          if [ -n "$TFSTATE_RESOURCE_GROUP" ] && [ -n "$TFSTATE_STORAGE_ACCOUNT" ] && [ -n "$TFSTATE_CONTAINER" ] && [ -n "$TFSTATE_KEY" ]; then
            terraform init -input=false \
              -backend-config="resource_group_name=$TFSTATE_RESOURCE_GROUP" \
              -backend-config="storage_account_name=$TFSTATE_STORAGE_ACCOUNT" \
              -backend-config="container_name=$TFSTATE_CONTAINER" \
              -backend-config="key=$TFSTATE_KEY"
          else
            terraform init -backend=false -input=false
          fi

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TFVARS_FILE: ${{ github.event.inputs.tfvars_file || 'terraform.tfvars' }}
        run: |
          if [ -f "$TFVARS_FILE" ]; then
            terraform plan -no-color -input=false -var-file="$TFVARS_FILE" -out=tfplan
          else
            terraform plan -no-color -input=false -out=tfplan
          fi
          terraform apply -auto-approve -input=false tfplan

      - name: Publish deployment outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## Foundry deployment outputs" >> "$GITHUB_STEP_SUMMARY"
          terraform output -raw foundry_project_endpoint | sed 's/^/- Foundry project endpoint: /' >> "$GITHUB_STEP_SUMMARY"
